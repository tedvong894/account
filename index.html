<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4C8DFF" />
  <title>小鱼记账</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Supabase JS（联网时自动加载；离线则自动回退到本地存储） -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body>
  <div id="app">
    <!-- 顶部栏 -->
    <header id="app-header">
      <div class="header-top">
        <span class="app-title">小鱼记账</span>
        <button id="btn-settings" class="icon-btn" type="button" title="设置">⚙️</button>
      </div>
      <div class="header-month">
        <button id="month-prev" class="month-nav" type="button">‹</button>
        <span id="header-month" class="month-label">2026-07</span>
        <button id="month-next" class="month-nav" type="button">›</button>
      </div>
      <div class="header-balance">
        <div class="balance-item">
          <span class="balance-label">支出</span>
          <span class="balance-value expense" id="header-expense">¥0.00</span>
        </div>
        <div class="balance-divider"></div>
        <div class="balance-item">
          <span class="balance-label">收入</span>
          <span class="balance-value income" id="header-income">¥0.00</span>
        </div>
        <div class="balance-divider"></div>
        <div class="balance-item">
          <span class="balance-label">结余</span>
          <span class="balance-value" id="header-balance">¥0.00</span>
        </div>
      </div>
    </header>

    <!-- 主体视图 -->
    <main id="main">
      <!-- 记账页 -->
      <section id="view-record" class="view active"></section>
      <!-- 明细页 -->
      <section id="view-detail" class="view"></section>
      <!-- 资产页 -->
      <section id="view-assets" class="view"></section>
      <!-- 统计页 -->
      <section id="view-stats" class="view"></section>
      <!-- 我的页 -->
      <section id="view-mine" class="view"></section>
    </main>

    <!-- 底部导航 -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-view="record" type="button">
        <span class="nav-icon">🏠</span><span class="nav-text">记账</span>
      </button>
      <button class="nav-item" data-view="detail" type="button">
        <span class="nav-icon">📜</span><span class="nav-text">明细</span>
      </button>
      <button class="nav-item" data-view="assets" type="button">
        <span class="nav-icon">💰</span><span class="nav-text">资产</span>
      </button>
      <button class="nav-item" data-view="stats" type="button">
        <span class="nav-icon">📊</span><span class="nav-text">统计</span>
      </button>
      <button class="nav-item" data-view="mine" type="button">
        <span class="nav-icon">👤</span><span class="nav-text">我的</span>
      </button>
    </nav>

    <!-- 悬浮记账按钮 -->
    <button id="fab-add" type="button" title="记一笔">＋</button>
  </div>

  <!-- 通用弹窗容器 -->
  <div id="modal-root"></div>
  <!-- 轻提示 -->
  <div id="toast-root"></div>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
